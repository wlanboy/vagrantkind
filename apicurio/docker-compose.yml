services:
  apicurio-db:
    image: postgres:15
    container_name: apicurio-db
    environment:
      POSTGRES_DB: apicurio
      POSTGRES_USER: apicurio
      POSTGRES_PASSWORD: password
    volumes:
      - /mnt/sata/apicurio/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apicurio"]
      interval: 5s
      timeout: 5s
      retries: 5

  apicurio-registry:
    image: apicurio/apicurio-registry-sql:latest-release
    container_name: apicurio-registry
    ports:
      - "8888:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://apicurio-db:5432/apicurio
      QUARKUS_DATASOURCE_USERNAME: apicurio
      QUARKUS_DATASOURCE_PASSWORD: password
      QUARKUS_DATASOURCE_DB_KIND: postgresql
    depends_on:
      apicurio-db:
        condition: service_healthy
